# .github/workflows/ci.yaml
# ===========================================================================
# Continuous Integration for the Protein Localization Predictor v2.0
#
# Runs on every push and pull request to main.
# Uses UV for fast, reproducible dependency installation.
# ===========================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Lint and type check (fast, runs first)
  # -----------------------------------------------------------------------
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/

  # -----------------------------------------------------------------------
  # Tests across Python versions
  # -----------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short -m "not slow and not gpu"

      - name: Run tests with coverage (Python 3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          uv run pytest tests/ -v --tb=short -m "not slow and not gpu" \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # -----------------------------------------------------------------------
  # Docker build check (ensures the image builds successfully)
  # -----------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    # Only run on pushes to main, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t protein-loc-predictor:ci --target production .

      - name: Verify image health check endpoint exists
        run: |
          docker run -d --name test-api -p 8000:8000 protein-loc-predictor:ci
          sleep 5
          curl -sf http://localhost:8000/health | python -m json.tool
          docker stop test-api
