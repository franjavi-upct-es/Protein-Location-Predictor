# configs/training.yaml
# ===========================================================================
# Training configuration — overrides and extends base.yaml
# ===========================================================================

training:
  # PyTorch Lightning trainer settings
  max_epochs: 30
  patience: 5 # Early stopping patience
  gradient_clip_val: 1.0
  accumulate_grad_batches: 4 # Effective batch = batch_size × 4

  # Optimizer
  optimizer:
    name: "adamw"
    lr: 2.0e-4 # LoRA learning rate (backbone)
    head_lr: 1.0e-3 # Classifier head learning rate
    weight_decay: 0.01
    betas: [0.9, 0.999]

  # Scheduler
  scheduler:
    name: "cosine_warmup"
    warmup_steps_fraction: 0.1 # 10% of total steps for warmup
    min_lr: 1.0e-6

  # Batch size is auto-determined by hardware detection,
  # but you can set a manual override here.
  batch_size: null # null = auto-detect from VRAM
  max_sequence_length: null # null = auto-detect from hardware profile

  # Empirical batch-size auto-tuning. When true and a CUDA GPU is
  # available, training.batch_size is overridden by the largest size
  # that survives a forward+backward probe with the configured model
  # and sequence length. Result is cached in .cache/auto_batch_size.json.
  auto_batch_size: false
  num_workers: 4
  pin_memory: true

  # Length-aware batching: groups sequences of similar length into the
  # same batch to minimize padding waste. Recommended for protein data
  # because the length distribution is heavy-tailed. Validation and
  # test loaders are unaffected (they use deterministic ordering).
  use_length_bucketing: false

  # Balanced multi-label sampling: guarantees that each batch contains
  # at least one positive example for each rare class. Use it for
  # severely imbalanced setups (e.g. when Golgi has < 1% of samples).
  # Mutually exclusive with use_length_bucketing — if both are true,
  # balanced sampling wins.
  use_balanced_sampling: false

  length_bucket_jitter: 0.05 # 0 = strict sort, larger = more diversity

  # Hardware-aware settings (auto-configured, can be overridden)
  precision: "bf16-mixed" # "bf16-mixed" | "16-mixed" | "32"
  gradient_checkpointing: true
  cpu_offload: false # Enable if VRAM is critically tight

  # Experiment tracking
  experiment:
    name: "protein-loc-v2"
    tracking_uri: "mlruns" # Local MLflow directory
    log_every_n_steps: 10
    save_top_k: 3 # Keep top 3 checkpoints by val_f1

  # Reproducibility
  deterministic: true

# ---------------------------------------------------------------------------
# Notes on enabling QLoRA for VRAM-constrained training
# ---------------------------------------------------------------------------
# To validate the QLoRA path on the current backbone (t30 150M), launch with:
#
#   uv run python -m src.training.train \
#     --overrides model.quantization.enabled=true
#
# Or set the env var:
#
#   PROT_LOC_MODEL__QUANTIZATION__ENABLED=true uv run python -m src.training.train
#
# Quantization requires a CUDA-capable GPU and the bitsandbytes package.
# It will raise an explicit error if either is missing.
